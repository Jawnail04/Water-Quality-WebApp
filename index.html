<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaMonitor | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        /* --- PRO VARIABLES & RESET --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --error-bg: rgba(254, 226, 226, 0.9);
            --error-text: #b91c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { 
            background: url('img/flare.jpg') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: floatUp 0.6s ease-out;
            position: relative;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section h2 { color: var(--text-dark); font-size: 1.75rem; font-weight: 800; margin-bottom: 8px; }
        .header-section p { color: var(--text-gray); font-size: 0.95rem; }

        .domain-notice {
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(37, 99, 235, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-google {
            width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.8);
            border-radius: 12px; background: rgba(255,255,255,0.7);
            color: var(--text-dark); font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.2s; display: flex;
            justify-content: center; align-items: center; gap: 10px;
        }
        
        .btn-google:hover { 
            background: #fff; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); 
        }

        .btn-google:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg { background: var(--error-bg); color: var(--error-text); padding: 12px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 20px; display: none; text-align: left; border: 1px solid rgba(185, 28, 28, 0.2); }
        
        .helper-text { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-gray); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="header-section">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to access the AquaMonitor Dashboard</p>
        </div>

        <div id="errorMessage" class="error-msg">
            <i class="ri-error-warning-fill" style="margin-right: 6px; vertical-align: middle;"></i>
            <span id="errorText">Error message here</span>
        </div>

        <div class="domain-notice">
            <i class="ri-information-line" style="font-size: 1.1rem;"></i> 
            Official DepEd Accounts Only
        </div>

        <button type="button" class="btn-google" id="googleBtn">
            <i class="ri-google-fill" style="font-size: 1.2rem; color: #DB4437;"></i>
            <span id="googleBtnText">Continue with Google</span>
        </button>
        
        <p class="helper-text">Access is restricted. Please use your <strong>@deped.gov.ph</strong> account to sign in securely.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // NEW IMPORTS: Added collection, query, where, getDocs, updateDoc
        import { getFirestore, collection, query, where, getDocs, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxWmm5YsLjnwatHOVImrpIHAxicbHWYuw",
            authDomain: "water-quality-db-d2dff.firebaseapp.com",
            projectId: "water-quality-db-d2dff",
            storageBucket: "water-quality-db-d2dff.firebasestorage.app",
            messagingSenderId: "499791448587",
            appId: "1:499791448587:web:a11b55aa1af45bdf78550e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        googleProvider.setCustomParameters({ prompt: 'select_account' });

        // --- CONFIGURATION ---
        const SUPER_ADMIN_EMAIL = "jhunelbangit@gmail.com";
        const RESTRICT_DOMAIN = true;  
        const REQUIRED_DOMAIN = "@deped.gov.ph";

        // DOM Elements
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const googleBtn = document.getElementById('googleBtn');
        const googleBtnText = document.getElementById('googleBtnText');

        function showError(msg) { 
            errorText.innerText = msg; 
            errorDiv.style.display = 'block'; 
        }
        
        function hideError() { 
            errorDiv.style.display = 'none'; 
        }
        
        function setLoading(isLoading) {
            if (isLoading) {
                googleBtn.disabled = true;
                googleBtnText.innerText = "Verifying access...";
            } else {
                googleBtn.disabled = false;
                googleBtnText.innerText = "Continue with Google";
            }
        }

        // --- CORE LOGIN LOGIC (UPDATED WITH PRE-REGISTRATION CHECK) ---
        async function handleLoginSuccess(user) {
            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", user.email));
                const querySnapshot = await getDocs(q);

                let role = "user";
                let docRefToUpdate = null;

                // 1. If email is NOT found in the database
                if (querySnapshot.empty) {
                    // Check if it's the Super Admin logging in for the very first time
                    if (user.email === SUPER_ADMIN_EMAIL) {
                        role = "superadmin";
                        docRefToUpdate = doc(collection(db, "users")); // Create a new document reference
                        await setDoc(docRefToUpdate, {
                            email: user.email,
                            role: role,
                            createdAt: new Date(),
                            lastLogin: new Date(),
                            authMethod: 'google',
                            uid: user.uid
                        });
                    } else {
                        // BLOCK UNAUTHORIZED USERS
                        await user.delete().catch(() => signOut(auth)); // Force delete/sign out
                        showError("Access Denied: Your account has not been pre-registered. Please contact your administrator.");
                        setLoading(false);
                        return; // Stop the login process
                    }
                } 
                // 2. If email IS found in the database (Pre-registered)
                else {
                    const userDoc = querySnapshot.docs[0];
                    const userData = userDoc.data();
                    
                    // Fetch the role that the admin assigned to them in the database
                    role = userData.role || "user"; 
                    docRefToUpdate = userDoc.ref;

                    // Failsafe for Super Admin
                    if (user.email === SUPER_ADMIN_EMAIL) role = "superadmin";

                    // Update their last login time
                    await updateDoc(docRefToUpdate, {
                        lastLogin: new Date(),
                        uid: user.uid, // Store their Google Auth UID 
                        authMethod: 'google'
                    });
                }

                // --- REDIRECT LOGIC ---
                if (role === 'superadmin') {
                    window.location.href = "admin-dashboard.html"; 
                } else if (role === 'admin') {
                    window.location.href = "main.html"; 
                } else {
                    window.location.href = "viewer.html";
                }

            } catch (error) {
                console.error("Database Error:", error);
                showError("Login verification failed. Please check your connection.");
                setLoading(false);
            }
        }

        // --- GOOGLE SIGN IN ---
        googleBtn.addEventListener('click', async () => {
            hideError();
            setLoading(true);

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Domain Check - Initial filter
                if (RESTRICT_DOMAIN && !user.email.endsWith(REQUIRED_DOMAIN) && user.email !== SUPER_ADMIN_EMAIL) {
                    await user.delete().catch(() => signOut(auth)); // Force sign out
                    showError(`Access Denied: Only ${REQUIRED_DOMAIN} accounts allowed.`);
                    setLoading(false);
                    return;
                }

                // Proceed to verify in Firestore
                await handleLoginSuccess(user);

            } catch (error) {
                console.error("Google Sign-In Error", error);
                setLoading(false);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError("Google Sign-In Failed: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
